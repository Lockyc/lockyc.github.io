---
layout: default
---

<div id="content-holder" class="row" role="main">
	<div class="col-md-8">
		{% for post in site.posts %}
		<article>
			<h3 class="post-title"><a class="post-link" href="{{ post.url | prepend: site.baseurl }}" rel="bookmark">{{ post.title }}</a></h3>
			<p class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</p>
			{{ post.content }}
		</article>
		{% endfor %}
	</div>
</div>
